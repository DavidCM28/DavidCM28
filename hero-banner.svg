<svg width="900" height="350" viewBox="0 0 900 350" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <!-- Gradient overlay on left side for text readability -->
    <linearGradient id="leftFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0d1117" stop-opacity="0.75"/>
      <stop offset="60%"  stop-color="#0d1117" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </linearGradient>

    <!-- Clip path for rounded corners -->
    <clipPath id="roundedClip">
      <rect width="900" height="350" rx="12" ry="12"/>
    </clipPath>
  </defs>

  <!-- Background image -->
  <image
    href="https://raw.githubusercontent.com/DavidCM28/DavidCM28/main/header-banner.png"
    x="0" y="0" width="900" height="350"
    preserveAspectRatio="xMidYMid slice"
    clip-path="url(#roundedClip)"
  />

  <!-- Left fade overlay for contrast -->
  <rect x="0" y="0" width="900" height="350" fill="url(#leftFade)" clip-path="url(#roundedClip)"/>

  <!-- ===== TEXT CONTENT ===== -->

  <!-- Greeting -->
  <text x="38" y="90" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="30" font-weight="800" fill="#ffffff" letter-spacing="-0.5">
    ¡Hola! Soy David 👋
  </text>

  <!-- Subtitle -->
  <text x="38" y="128" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="15" font-weight="600" fill="#58a6ff" letter-spacing="0.3">
    Transformo ideas en soluciones digitales
  </text>

  <!-- Separator line -->
  <line x1="38" y1="142" x2="370" y2="142" stroke="#58a6ff" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- Description lines -->
  <text x="38" y="170" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="13" fill="#c9d1d9" opacity="0.9">
    Estudiante de Ingeniería en Desarrollo de Software
  </text>
  <text x="38" y="190" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="13" fill="#c9d1d9" opacity="0.9">
    apasionado por el desarrollo web, el diseño de
  </text>
  <text x="38" y="210" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="13" fill="#c9d1d9" opacity="0.9">
    experiencias y la creación de sistemas que
  </text>
  <text x="38" y="230" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="13" fill="#c9d1d9" opacity="0.9">
    realmente marcan la diferencia.
  </text>

  <!-- Badges row -->
  <!-- Badge: México -->
  <rect x="38"  y="255" width="88"  height="26" rx="5" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="82"  y="273" font-family="'Segoe UI', Arial, sans-serif" font-size="11"
        fill="#8b949e" text-anchor="middle">📍 México</text>

  <!-- Badge: Edad -->
  <rect x="134" y="255" width="82"  height="26" rx="5" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="175" y="273" font-family="'Segoe UI', Arial, sans-serif" font-size="11"
        fill="#8b949e" text-anchor="middle">🎂 21 años</text>

  <!-- Badge: GMT -->
  <rect x="224" y="255" width="72"  height="26" rx="5" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="260" y="273" font-family="'Segoe UI', Arial, sans-serif" font-size="11"
        fill="#8b949e" text-anchor="middle">🕐 GMT-6</text>

  <!-- Badge: Disponible -->
  <rect x="304" y="255" width="190" height="26" rx="5" fill="#0d2b00" stroke="#238636" stroke-width="1"/>
  <circle cx="322" cy="268" r="5" fill="#3fb950"/>
  <text x="332" y="273" font-family="'Segoe UI', Arial, sans-serif" font-size="11"
        fill="#3fb950">Disponible para proyectos</text>

  <!-- Decorative code bracket (bottom-left subtle) -->
  <text x="38" y="325" font-family="'Courier New', monospace" font-size="11"
        fill="#58a6ff" opacity="0.35" letter-spacing="1">
    &lt;/&gt; Full Stack Developer in formation
  </text>
</svg>
